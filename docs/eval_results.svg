font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+5 pass</text><text x="430" y="315" font-family="Arial" font-size="12" fill="#475569">cost not reported by CLI (tokens below)</text><text x="216" y="336" font-family="Arial" font-size="12" fill="#475569">calls 8.5 -&gt; 3.9   |   fresh-input tok 31774 -&gt; 14939   |   cache-read 194482 -&gt; 140718</text><text x="40" y="390" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Codex</text><text x="40" y="408" font-family="Arial" font-size="12" fill="#6b7280">GPT-5.4-mini</text><rect x="200" y="360" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="385" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">11 -&gt; 13 / 28</text><text x="320" y="385" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+2 pass</text><text x="430" y="385" font-family="Arial" font-size="12" fill="#475569">cost not reported by CLI (tokens below)</text><text x="216" y="406" font-family="Arial" font-size="12" fill="#475569">calls 10.4 -&gt; 6.7   |   fresh-input tok 40460 -&gt; 30915   |   cache-read 338917 -&gt; 279634</text><text x="40" y="460" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Pi + OpenRouter (OSS)</text><text x="40" y="478" font-family="Arial" font-size="12" fill="#6b7280">Kimi K2.7</text><rect x="200" y="430" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="455" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">18 -&gt; 21 / 28</text><text x="320" y="455" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+3 pass</text><text x="430" y="455" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">cost $0.0614 -&gt; $0.0404 (+34%)</text><text x="216" y="476" font-family="Arial" font-size="12" fill="#475569">calls 9.3 -&gt; 5.7   |   fresh-input tok 7506 -&gt; 2405   |   cache-read 79851 -&gt; 60218</text><text x="40" y="530" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Pi + OpenRouter (OSS)</text><text x="40" y="548" font-family="Arial" font-size="12" fill="#6b7280">GLM 5.2</text><rect x="200" y="500" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="525" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">17 -&gt; 21 / 28</text><text x="320" y="525" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+4 pass</text><text x="430" y="525" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">cost $0.0233 -&gt; $0.0155 (+33%)</text><text x="216" y="546" font-family="Arial" font-size="12" fill="#475569">calls 5.8 -&gt; 2.9   |   fresh-input tok 857 -&gt; 699   |   cache-read 33930 -&gt; 17229</text><text x="40" y="600" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Pi + OpenRouter (OSS)</text><text x="40" y="618" font-family="Arial" font-size="12" fill="#6b7280">DeepSeek V4 Flash</text><rect x="200" y="570" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="595" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">16 -&gt; 18 / 28</text><text x="320" y="595" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+2 pass</text><text x="430" y="595" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">cost $0.0143 -&gt; $0.0085 (+40%)</text><text x="216" y="616" font-family="Arial" font-size="12" fill="#475569">calls 9.7 -&gt; 7.8   |   fresh-input tok 33737 -&gt; 3600   |   cache-read 59493 -&gt; 54848</text>
  <text x="40" y="665" font-family="Arial" font-size="11" fill="#9ca3af">Dataset: dreeseaw/mdlens-realdocs-v1. Claude cost is cache-aware (cache reads priced below fresh input). Codex CLI reports tokens, not dollars.</text>
</svg>
