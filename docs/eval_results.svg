<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-labelledby="t d">
  <title id="t">mdlens real-docs eval results</title>
  <desc id="d">Baseline shell retrieval vs mdlens scout across Claude Code and Codex models on 28 real-documentation questions.</desc>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="40" y="44" font-family="Arial" font-size="24" font-weight="700" fill="#14213d">mdlens real-docs eval (v0.1.3)</text>
  <text x="40" y="70" font-family="Arial" font-size="13" fill="#4b5563">Baseline shell retrieval (rg/cat) vs mdlens scout. 28 questions (needle, multi-hop, abstention) over 673 real docs from 6 OSS projects.</text>
  <text x="40" y="90" font-family="Arial" font-size="13" fill="#6b7280">Cells: pass-count baseline -&gt; mdlens, plus avg tool calls, fresh (uncached) input tokens, and cache reads. Claude shows authoritative dollar cost.</text>
  <text x="40" y="180" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Claude Code</text><text x="40" y="198" font-family="Arial" font-size="12" fill="#6b7280">Opus 4.8</text><rect x="200" y="150" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="175" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">19 -&gt; 21 / 28</text><text x="320" y="175" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+2 pass</text><text x="430" y="175" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">cost $0.1576 -&gt; $0.1579 (-0%)</text><text x="216" y="196" font-family="Arial" font-size="12" fill="#475569">calls 4.1 -&gt; 2.2   |   fresh-input tok 2633 -&gt; 2620   |   cache-read 62343 -&gt; 40324</text><text x="40" y="250" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Claude Code</text><text x="40" y="268" font-family="Arial" font-size="12" fill="#6b7280">Sonnet 4.6</text><rect x="200" y="220" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="245" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">18 -&gt; 18 / 28</text><text x="320" y="245" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+0 pass</text><text x="430" y="245" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">cost $0.1424 -&gt; $0.1307 (+8%)</text><text x="216" y="266" font-family="Arial" font-size="12" fill="#475569">calls 6.9 -&gt; 5.0   |   fresh-input tok 10 -&gt; 8   |   cache-read 153988 -&gt; 135738</text><text x="40" y="320" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Codex</text><text x="40" y="338" font-family="Arial" font-size="12" fill="#6b7280">GPT-5.4</text><rect x="200" y="290" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="315" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">15 -&gt; 20 / 28</text><text x="320" y="315" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+5 pass</text><text x="430" y="315" font-family="Arial" font-size="12" fill="#475569">cost not reported by CLI (tokens below)</text><text x="216" y="336" font-family="Arial" font-size="12" fill="#475569">calls 8.5 -&gt; 3.9   |   fresh-input tok 31774 -&gt; 14939   |   cache-read 194482 -&gt; 140718</text><text x="40" y="390" font-family="Arial" font-size="14" font-weight="700" fill="#1f2937">Codex</text><text x="40" y="408" font-family="Arial" font-size="12" fill="#6b7280">GPT-5.4-mini</text><rect x="200" y="360" width="760" height="58" rx="8" fill="#e8f7f2" stroke="#8bd0bd"/><text x="216" y="385" font-family="Arial" font-size="16" font-weight="700" fill="#0f172a">11 -&gt; 13 / 28</text><text x="320" y="385" font-family="Arial" font-size="13" font-weight="700" fill="#0f766e">+2 pass</text><text x="430" y="385" font-family="Arial" font-size="12" fill="#475569">cost not reported by CLI (tokens below)</text><text x="216" y="406" font-family="Arial" font-size="12" fill="#475569">calls 10.4 -&gt; 6.7   |   fresh-input tok 40460 -&gt; 30915   |   cache-read 338917 -&gt; 279634</text>
  <text x="40" y="450" font-family="Arial" font-size="11" fill="#9ca3af">Dataset: dreeseaw/mdlens-realdocs-v1. Claude cost is cache-aware (cache reads priced below fresh input). Codex CLI reports tokens, not dollars.</text>
</svg>
