<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="830" viewBox="0 0 1120 830" role="img" aria-labelledby="title desc">
  <title id="title">mdlens combined Markdown eval results</title>
  <desc id="desc">Matrix chart comparing baseline shell retrieval with mdlens scout across model and harness axes on a 30-question combined Markdown search eval.</desc>
